<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Componentes y Computadores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%; padding: 0.5rem; margin-top: 0.25rem;
            border: 1px solid #ccc; border-radius: 0.25rem;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{% url 'product_list' %}" class="text-2xl font-bold tracking-wider">TechStore</a>
            <div class="space-x-4 flex items-center">
                {% if user.is_authenticated %}
                    <a href="{% url 'cart_detail' %}" class="hover:text-blue-300 transition flex items-center">
                        🛒 Carrito 
                        <span class="bg-red-500 text-white rounded-full px-2 py-0.5 text-xs ml-1 font-bold">{{ cart_item_count|default:"0" }}</span>
                    </a>
                    <span class="text-gray-300">Hola, {{ user.username }}</span>
                    <form action="{% url 'logout' %}" method="post" class="inline m-0 p-0">
                        {% csrf_token %}
                        <button type="submit" class="hover:text-red-400 font-semibold transition">Cerrar Sesión</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="hover:text-blue-300 transition">Iniciar Sesión</a>
                    <a href="{% url 'register' %}" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded transition shadow">Registrarse</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="container mx-auto mt-8 p-4 flex-grow">
        {% block content %}{% endblock %}
    </main>
    <footer class="bg-gray-800 text-white text-center p-4 mt-auto">
        <p>&copy; 2026 TechStore. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
