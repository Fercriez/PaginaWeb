{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg mt-10">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Iniciar Sesión</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-200">Entrar</button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-600">¿No tienes cuenta? <a href="{% url 'register' %}" class="text-blue-500 hover:underline">Regístrate aquí</a></p>
</div>
{% endblock %}
